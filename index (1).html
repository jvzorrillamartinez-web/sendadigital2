<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f6f2e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icono-192.png">
<link rel="apple-touch-icon" href="icono-192.png">
<title>SendaDigital</title>
<style>
  :root{
    --fondo:#f6f2e8; --superficie:#fff; --borde:#e2e2dd;
    --texto:#22221f; --suave:#6b6b64;
    --ok:#0f6e56; --ok-fondo:#e1f5ee;
    --crisis:#a32d2d; --crisis-borde:#f09595;
    --radio:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --fondo:#17171a; --superficie:#202024; --borde:#34343a;
      --texto:#ececec; --suave:#a0a0a0;
      --ok:#5dcaa5; --ok-fondo:#123a30;
      --crisis:#f09595; --crisis-borde:#7a3b3b;
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--fondo); color:var(--texto);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  main{max-width:460px; margin:0 auto; padding:16px; display:flex; flex-direction:column; gap:12px}

  /* Señal de honestidad: ¿hay alguien detrás ahora? */
  .estado{display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:var(--radio); background:var(--superficie); border:1px solid var(--borde)}
  .estado[data-abierto="true"]{background:var(--ok-fondo); border-color:transparent}
  .punto{width:10px; height:10px; border-radius:50%; background:var(--suave); flex:none}
  .estado[data-abierto="true"] .punto{background:var(--ok)}
  .estado div{display:flex; flex-direction:column; line-height:1.35}
  .estado strong{font-size:15px}
  .estado span{font-size:13px; color:var(--suave)}
  .estado[data-abierto="true"] strong, .estado[data-abierto="true"] span{color:var(--ok)}

  /* Bloque de apoyo: idéntico a cualquier hora. Sin alarma. */
  .apoyo{background:var(--superficie); border:1px solid var(--borde);
    border-radius:var(--radio); padding:16px}
  .apoyo h2{margin:0 0 6px; font-size:16px; font-weight:500}
  .apoyo p{margin:0; font-size:14px; color:var(--suave); line-height:1.55}
  .apoyo strong{color:var(--texto)}
  .aviso{margin:10px 0 0 !important; font-size:14px; color:var(--texto); line-height:1.55}
  .peligro{margin:12px 0 0 !important; padding-top:12px; border-top:1px solid var(--borde);
    font-size:13px !important; line-height:1.5}
  .peligro a{color:var(--crisis); font-weight:600; text-decoration:none;
    border-bottom:1px solid var(--crisis-borde); padding-bottom:1px}

  .tarjeta{display:flex; flex-direction:column; gap:2px; text-align:left; width:100%;
    background:var(--superficie); border:1px solid var(--borde); border-radius:var(--radio);
    padding:16px; font:inherit; color:inherit; cursor:pointer}
  .tarjeta.foco{border-color:var(--suave)}
  .tarjeta.atenuada{opacity:.65}
  .tarjeta b{font-size:15px; font-weight:500}
  .tarjeta em{font-size:13px; color:var(--suave); font-style:normal}

  /* Navegación */
  .volver{align-self:flex-start; background:none; border:none; padding:6px 0;
    font:inherit; font-size:14px; color:var(--suave); cursor:pointer}
  h1.titulo{margin:0; font-size:20px; font-weight:500}
  p.entradilla{margin:0; font-size:14px; color:var(--suave); line-height:1.55}

  /* Ejercicio */
  .ejercicio{background:var(--superficie); border:1px solid var(--borde);
    border-radius:var(--radio); padding:20px; text-align:center}
  .reloj{font-size:42px; font-variant-numeric:tabular-nums; font-weight:300; margin:4px 0}
  .guia{min-height:3.2em; font-size:15px; color:var(--suave); line-height:1.6; margin:0}
  .pasos{margin:0; padding-left:20px; text-align:left; font-size:14px; line-height:1.7}
  .pasos li{margin-bottom:6px}
  .nota{font-size:12px; color:var(--suave); line-height:1.5; margin:14px 0 0;
    padding-top:12px; border-top:1px solid var(--borde); text-align:left}
  .ficha{font-size:12px; color:var(--suave); margin:0}

  .boton{width:100%; background:var(--texto); color:var(--fondo); border:none;
    border-radius:10px; padding:14px; font:inherit; font-size:15px; cursor:pointer}
  .boton.sec{background:none; color:var(--suave); border:1px solid var(--borde)}

  /* Círculo de respiración */
  .circulo{width:150px; height:150px; margin:20px auto; border-radius:50%;
    background:var(--ok-fondo); border:2px solid var(--ok);
    transition:transform linear; transform:scale(.55)}

  /* Avisos */
  .aviso-item{background:var(--superficie); border:1px solid var(--borde);
    border-radius:var(--radio); padding:16px}
  .aviso-item h3{margin:0 0 4px; font-size:15px; font-weight:600}
  .aviso-item .cuando{display:inline-block; font-size:13px; color:var(--ok);
    background:var(--ok-fondo); border-radius:6px; padding:2px 8px; margin-bottom:8px}
  .aviso-item p{margin:0; font-size:14px; color:var(--suave); line-height:1.6;
    white-space:pre-line}
  .vacio{font-size:14px; color:var(--suave); line-height:1.6; text-align:center;
    padding:24px 8px}

  /* Bienvenida */
  .bienvenida{background:var(--superficie); border:1px solid var(--borde);
    border-radius:var(--radio); padding:20px}
  .bienvenida h1{margin:0 0 4px; font-size:22px; font-weight:500}
  .bienvenida .paso-num{font-size:12px; color:var(--suave); letter-spacing:.05em}
  .bienvenida p{font-size:15px; line-height:1.65; color:var(--texto)}
  .bienvenida .lista{margin:0; padding:0; list-style:none}
  .bienvenida .lista li{display:flex; gap:12px; align-items:flex-start; margin:14px 0}
  .bienvenida .lista .ico{font-size:22px; flex:none; width:28px; text-align:center}
  .bienvenida .lista b{font-weight:600; font-size:15px}
  .bienvenida .lista span{font-size:13px; color:var(--suave); line-height:1.5}
  .puntos{display:flex; gap:6px; justify-content:center; margin:16px 0}
  .puntos i{width:7px; height:7px; border-radius:50%; background:var(--borde)}
  .puntos i.on{background:var(--texto)}
  .saltar{position:absolute; top:16px; right:16px; background:none; border:none;
    font:inherit; font-size:14px; color:var(--suave); cursor:pointer; text-decoration:underline}
  .ayuda-btn{background:none; border:none; font:inherit; font-size:20px; color:var(--suave);
    cursor:pointer; padding:4px 8px; line-height:1}
  .cabecera-fila{display:flex; align-items:center; gap:8px}
  .cabecera-fila .estado{flex:1}

  /* Tarjeta diaria */
  .bloque{background:var(--superficie); border:1px solid var(--borde);
    border-radius:var(--radio); padding:16px}
  .bloque h3{margin:0 0 12px; font-size:15px; font-weight:500}
  .animos{display:flex; gap:6px}
  .animo{flex:1; aspect-ratio:1; border:1px solid var(--borde); border-radius:10px;
    background:none; font-size:22px; cursor:pointer; display:flex; align-items:center;
    justify-content:center; padding:0; transition:transform .1s}
  .animo[aria-pressed="true"]{border-color:var(--texto); border-width:2px; transform:scale(1.06)}
  .animo-etq{display:flex; justify-content:space-between; font-size:11px;
    color:var(--suave); margin-top:6px}
  .habs{display:flex; flex-direction:column; gap:8px}
  .hab{display:flex; align-items:center; gap:10px; border:1px solid var(--borde);
    border-radius:10px; padding:12px; background:none; font:inherit; font-size:14px;
    color:inherit; cursor:pointer; text-align:left}
  .hab[aria-pressed="true"]{border-color:var(--ok); background:var(--ok-fondo); color:var(--ok)}
  .hab .marca{width:18px; flex:none; text-align:center}
  textarea{width:100%; border:1px solid var(--borde); border-radius:10px; padding:12px;
    font:inherit; font-size:14px; background:var(--fondo); color:var(--texto);
    resize:vertical; min-height:80px}

  /* Sugerencia cuando el ánimo está bajo: menú, no veredicto */
  .sugerencia{background:var(--ok-fondo); border:1px solid var(--ok);
    border-radius:var(--radio); padding:16px}
  .sugerencia p{margin:0 0 12px; font-size:14px; line-height:1.6; color:var(--ok)}
  .sugerencia .recuerda{margin:12px 0 0; font-size:13px; color:var(--suave)}

  /* Progreso */
  .contador{text-align:center; padding:20px}
  .contador .num{font-size:44px; font-weight:300; line-height:1.1}
  .contador .etq{font-size:14px; color:var(--suave)}
  .tira{display:grid; grid-template-columns:repeat(10,1fr); gap:5px; margin-top:4px}
  .dia{aspect-ratio:1; border-radius:5px; background:var(--fondo);
    border:1px solid var(--borde)}
  .leyenda{display:flex; justify-content:space-between; font-size:11px;
    color:var(--suave); margin-top:10px}
  .peligro-btn{width:100%; background:none; border:1px solid var(--crisis-borde);
    color:var(--crisis); border-radius:10px; padding:12px; font:inherit; font-size:14px;
    cursor:pointer}

  /* Balanza pros y contras */
  .balanza{display:flex; flex-direction:column; gap:10px}
  .cara{border:1px solid var(--borde); border-radius:12px; padding:14px; text-align:left}
  .cara h3{margin:0 0 8px; font-size:14px; font-weight:600}
  .cara.si h3{color:var(--ok)}
  .cara.no h3{color:var(--crisis)}
  .cara ul{margin:0; padding-left:18px; font-size:14px; line-height:1.7; color:var(--suave)}
  .cierre{font-size:14px; line-height:1.6; color:var(--texto); margin:0}
</style>
</head>
<body>
<main>
  <div class="cabecera-fila">
    <header class="estado" id="estado">
      <div class="punto"></div>
      <div><strong id="estadoTitulo"></strong><span id="estadoSub"></span></div>
    </header>
    <button class="ayuda-btn" onclick="abrirAyuda()" title="¿Qué es esto?"
      aria-label="¿Qué es esto?">?</button>
  </div>

  <!-- Bloque de apoyo: NO cambia con la hora. Funciona sin conexión. -->
  <section class="apoyo">
    <h2 id="apoyoTitulo"></h2>
    <p id="apoyoTexto"></p>
    <p class="aviso" id="apoyoAviso" hidden></p>
    <p class="peligro" id="apoyoPeligro"></p>
  </section>

  <div id="vista"></div>
</main>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURACIÓN — esto es lo único que hay que tocar
   ═══════════════════════════════════════════════════════════════ */

// Horario REAL del centro (cuándo hay alguien detrás).
// 0=domingo, 1=lunes, 2=martes, 3=miércoles, 4=jueves, 5=viernes, 6=sábado
// null = ese día el centro no abre.
const HORARIO = {
  0: null,
  1: { inicio:'09:00', fin:'20:30' },
  2: { inicio:'09:00', fin:'20:30' },
  3: { inicio:'09:00', fin:'20:30' },
  4: { inicio:'09:00', fin:'20:30' },
  5: { inicio:'09:00', fin:'13:30' },
  6: null,
};

// Andamiaje de textos. La redacción final es de Jo.
const TEXTOS = {
  apoyoTitulo: 'Si no consigues ponerlo en marcha',
  apoyoTexto: 'Si has probado tus recursos y el malestar no baja, <strong>acude a urgencias</strong>. Están abiertas siempre.',
  avisoSinModeracion: 'Ahora no hay nadie en el centro: no esperes respuesta aquí.',
  // 112: para lo que no admite espera ni desplazamiento. No es la vía para el craving.
  peligro: 'Si hay peligro inmediato para tu vida o tu seguridad, o no puedes desplazarte: <a href="tel:112">112</a>',
};

// ── Ejercicios de tolerancia al malestar ──────────────────────
// Frases del surf del craving: van rotando durante los 15 minutos.
const FRASES_SURF = [
  'El impulso es una ola. Sube, llega arriba y baja sola.',
  'No tienes que hacer nada con él. Solo mirarlo pasar.',
  '¿Dónde lo notas en el cuerpo? Obsérvalo sin pelearte.',
  'No estás cediendo. Estás esperando. Es distinto.',
  'La ola ya ha empezado a bajar aunque todavía no lo notes.',
  'Cada minuto que pasa, el impulso pierde fuerza.',
  'Has aguantado hasta aquí. Ya sabes que se puede.',
  'No dura para siempre. Nunca lo ha hecho.',
];

const PROS_SI = [
  'Mantengo mi sobriedad y mis logros',
  'Mañana me sentiré bien conmigo',
  'Protejo mis relaciones y mi salud',
  'El impulso dura solo 15-20 minutos',
];
const PROS_NO = [
  'Vuelvo a empezar la cuenta',
  'La culpa empeorará el estado',
  'Un trago nunca se queda solo',
  'Rompo la promesa que me hice',
];

// ── Tarjeta diaria ────────────────────────────────────────────
// La escala de ánimo. Los colores van de apagado a verde: NUNCA rojo.
// Estar bajo no es un error, y la app no lo pinta como una alarma.
const ANIMOS = [
  { n:1, cara:'😞', etq:'Muy bajo', color:'#7a8a9a' },
  { n:2, cara:'😕', etq:'Bajo',     color:'#9aa5ad' },
  { n:3, cara:'😐', etq:'Regular',  color:'#c2b280' },
  { n:4, cara:'🙂', etq:'Bien',     color:'#7fb894' },
  { n:5, cara:'😊', etq:'Muy bien', color:'#0f6e56' },
];

// Las habilidades son las mismas que se pueden practicar en la app.
const HABILIDADES = [
  { id:'surf',        etq:'🌊 Surf del craving' },
  { id:'respiracion', etq:'🫁 Respiración' },
  { id:'tip',         etq:'🧊 Temperatura' },
  { id:'pros',        etq:'⚖️ Pros y contras' },
  { id:'otra',        etq:'✋ Otra cosa que me ayudó' },
];

// A partir de qué ánimo se ofrece ayuda. Ofrecer, no diagnosticar.
const ANIMO_BAJO = 2;

// ── Bienvenida (primera vez) y botón "¿Qué es esto?" ──────────
// Editable. Cada objeto es una pantalla de la bienvenida.
const BIENVENIDA = [
  {
    titulo: 'Bienvenido a SendaDigital',
    texto: 'Un espacio de apoyo para tu recuperación, para tenerlo a mano entre sesiones. '
         + 'No sustituye a tu terapeuta ni a las reuniones: los acompaña.',
    lista: null,
  },
  {
    titulo: 'Para los momentos difíciles',
    texto: 'Cuando aprieta el impulso de beber, tienes cuatro herramientas. No hace falta '
         + 'hacerlas bien: basta con empezar.',
    lista: [
      { ico:'🌊', b:'Surf del craving', s:'El impulso es una ola: sube, llega arriba y baja sola. Aquí la acompañas hasta que pasa.' },
      { ico:'🫁', b:'Respiración 4-6-8', s:'Soltar el aire despacio baja la activación del cuerpo.' },
      { ico:'🧊', b:'Temperatura', s:'El frío en la cara corta la activación en segundos. Para cuando no puedes ni pensar.' },
      { ico:'⚖️', b:'Pros y contras', s:'Mirar la balanza antes de decidir. Leerla ya es ganar tiempo.' },
    ],
  },
  {
    titulo: 'Tu día a día',
    texto: 'Además de los momentos difíciles:',
    lista: [
      { ico:'📆', b:'Tarjeta de hoy', s:'Cómo estás y qué has practicado. Quince segundos. Solo para ti: nadie más lo ve.' },
      { ico:'📈', b:'Tu progreso', s:'La forma de tus días, no una nota. Para ver qué se repite y qué te ayuda.' },
      { ico:'📢', b:'Avisos', s:'Las actividades de la asociación. La participación siempre es voluntaria.' },
    ],
  },
  {
    titulo: 'Dos cosas más',
    texto: 'La app te dice si hay alguien en el centro en este momento, y es sincera cuando '
         + 'no lo hay: fuera de horario, no esperes respuesta aquí. Si el malestar no baja, '
         + 'urgencias está abierta siempre.\n\nEsto irá creciendo: se añadirán ejercicios y '
         + 'mejoras poco a poco. Lo que ves hoy es el principio.',
    lista: null,
  },
];

/* ═══════════════════════════════════════════════════════════════
   LÓGICA — a partir de aquí, normalmente no hace falta tocar nada
   ═══════════════════════════════════════════════════════════════ */

const DIAS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const aMinutos = h => { const [a,b] = h.split(':').map(Number); return a*60 + b; };

// ¿Hay moderación en este momento?
function estadoVentana(ahora = new Date()){
  const dia = ahora.getDay();
  const m = ahora.getHours()*60 + ahora.getMinutes();
  const franja = HORARIO[dia];
  if (franja && m >= aMinutos(franja.inicio) && m < aMinutos(franja.fin)){
    // fin exclusivo: a las 20:30 exactas ya está cerrado
    return { abierto:true, cierraA:franja.fin, proximaApertura:null };
  }
  return { abierto:false, cierraA:null, proximaApertura:proximaApertura(ahora) };
}

function proximaApertura(ahora){
  const m = ahora.getHours()*60 + ahora.getMinutes();
  for (let i = 0; i < 8; i++){
    const dia = (ahora.getDay() + i) % 7;
    const franja = HORARIO[dia];
    if (!franja) continue;
    if (i === 0 && m >= aMinutos(franja.inicio)) continue; // hoy ya pasó la apertura
    const cuando = i === 0 ? 'hoy' : i === 1 ? 'mañana' : DIAS[dia];
    return cuando + ' a las ' + franja.inicio;
  }
  return null;
}

// ── Avisos: se leen de avisos.txt (lo edita el terapeuta en GitHub) ──
let avisos = null;      // null = todavía no cargado
let avisosFallo = false;

const esc = s => s.replace(/[&<>"]/g, c =>
  ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));

// Formato tolerante: bloques separados por una línea con ---
// 1ª línea = título · línea "cuándo:" = fecha (opcional) · resto = texto
function parsearAvisos(texto){
  return texto.split(/^\s*---+\s*$/m)
    .map(bloque => {
      const lineas = bloque.split('\n').map(l => l.trim()).filter(l => l !== '');
      if (!lineas.length) return null;
      const titulo = lineas.shift().replace(/^#+\s*/, ''); // admite # delante
      let cuando = '';
      const i = lineas.findIndex(l => /^cu[áa]ndo\s*:/i.test(l));
      if (i !== -1) cuando = lineas.splice(i,1)[0].replace(/^cu[áa]ndo\s*:\s*/i, '');
      return { titulo, cuando, texto: lineas.join('\n') };
    })
    .filter(Boolean);
}

async function cargarAvisos(){
  try {
    const r = await fetch('avisos.txt', { cache:'no-cache' });
    if (!r.ok) throw new Error(r.status);
    avisos = parsearAvisos(await r.text());
  } catch (e) {
    avisosFallo = true;   // sin conexión, o abierto como archivo suelto
  }
  if (pantalla === 'inicio' || pantalla === 'avisos') pintar();
}

// ── Datos: SIEMPRE en este móvil, nunca salen ─────────────────
// Son datos de salud (art. 9 RGPD). No hay servidor, no hay envío,
// no hay copia. Si la persona borra, desaparecen de verdad.
const CLAVE_TARJETAS = 'senda.tarjetas';
const CLAVE_CONSENT  = 'senda.consentimiento';
const CLAVE_VISTA    = 'senda.bienvenida';   // ¿ya vio la bienvenida?

function bienvenidaVista(){
  try { return localStorage.getItem(CLAVE_VISTA) === 'si'; } catch(e){ return false; }
}
function marcarBienvenidaVista(){
  try { localStorage.setItem(CLAVE_VISTA, 'si'); } catch(e){}
}

const hoyISO = (d = new Date()) =>
  d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' +
  String(d.getDate()).padStart(2,'0');

function leerTarjetas(){
  try { return JSON.parse(localStorage.getItem(CLAVE_TARJETAS) || '{}'); }
  catch(e){ return {}; }   // si el dato está corrupto, no romper la app
}
function guardarTarjeta(fecha, datos){
  const t = leerTarjetas();
  t[fecha] = datos;
  try { localStorage.setItem(CLAVE_TARJETAS, JSON.stringify(t)); return true; }
  catch(e){ return false; }
}
function hayConsentimiento(){
  try { return localStorage.getItem(CLAVE_CONSENT) === 'si'; } catch(e){ return false; }
}
function darConsentimiento(){
  try { localStorage.setItem(CLAVE_CONSENT, 'si'); } catch(e){}
}
function borrarTodo(){
  try {
    localStorage.removeItem(CLAVE_TARJETAS);
    localStorage.removeItem(CLAVE_CONSENT);
    localStorage.removeItem(CLAVE_VISTA);
  } catch(e){}
}

// Días practicando: un TOTAL, no una racha.
// Una racha se rompe y castiga; un total solo sube. No se puede perder.
function diasPracticando(){
  return Object.values(leerTarjetas())
    .filter(t => t.habilidades && t.habilidades.length > 0).length;
}

// ── Temporizadores: se paran SIEMPRE al cambiar de pantalla ────
let relojes = [];
function pararRelojes(){
  relojes.forEach(id => { clearTimeout(id); clearInterval(id); });
  relojes = [];
}
const mmss = seg =>
  String(Math.floor(seg/60)).padStart(2,'0') + ':' + String(seg%60).padStart(2,'0');

// ── Navegación entre pantallas ─────────────────────────────────
let pantalla = 'inicio';

function ir(nombre){
  pararRelojes();          // nunca dejar un cronómetro corriendo por detrás
  pantalla = nombre;
  scrollTo(0,0);
  pintar();
}

const vista = () => document.getElementById('vista');

// ── Pantallas ──────────────────────────────────────────────────

// Subtítulo de la tarjeta de hoy. Sin regañar si no está hecha.
function resumenTarjeta(){
  if (!hayConsentimiento()) return 'cómo estás hoy';
  const t = leerTarjetas()[hoyISO()];
  if (!t) return '¿cómo estás hoy?';
  const a = ANIMOS.find(x => x.n === t.animo);
  return 'hecha ✓' + (a ? ' · ' + a.etq.toLowerCase() : '');
}

// Subtítulo de la tarjeta de avisos: el próximo, si se ha podido cargar.
function resumenAvisos(){
  if (avisos === null) return avisosFallo ? 'actividades de la asociación' : 'cargando…';
  if (!avisos.length) return 'no hay avisos ahora mismo';
  return esc(avisos[0].titulo);
}

function pantallaInicio(){
  const v = estadoVentana();
  const tarjetaAvisos = clase => `
    <button class="tarjeta ${clase}" onclick="ir('avisos')">
      <b>Avisos</b><em>${resumenAvisos()}</em>
    </button>`;

  vista().innerHTML = v.abierto ? `
    <button class="tarjeta" onclick="ir('menu')">
      <b>Un momento difícil</b><em>tolerancia al malestar</em>
    </button>
    <button class="tarjeta" onclick="ir('tarjeta')">
      <b>Tarjeta de hoy</b><em>${resumenTarjeta()}</em>
    </button>
    ${tarjetaAvisos('')}`
  : `
    <button class="tarjeta foco" onclick="ir('menu')">
      <b>Un momento difícil</b><em>tolerancia al malestar · empezar</em>
    </button>
    <button class="tarjeta atenuada" onclick="ir('tarjeta')">
      <b>Tarjeta de hoy</b><em>${resumenTarjeta()}</em>
    </button>
    ${tarjetaAvisos('atenuada')}`;
}

// Bienvenida: solo la primera vez. Siempre se puede saltar.
// Quien abre la app en pleno craving no necesita leer: necesita el surf ya.
let pasoBienvenida = 0;

function pantallaBienvenida(){
  const p = BIENVENIDA[pasoBienvenida];
  const ultimo = pasoBienvenida === BIENVENIDA.length - 1;

  vista().innerHTML = `
    <div style="position:relative">
      <button class="saltar" onclick="cerrarBienvenida()">Saltar</button>
      <section class="bienvenida">
        <span class="paso-num">${pasoBienvenida + 1} de ${BIENVENIDA.length}</span>
        <h1>${esc(p.titulo)}</h1>
        <p style="white-space:pre-line">${esc(p.texto)}</p>
        ${p.lista ? `<ul class="lista">${p.lista.map(x => `
          <li><span class="ico">${x.ico}</span>
            <span><b>${esc(x.b)}</b><br><span>${esc(x.s)}</span></span></li>`).join('')}</ul>` : ''}
        <div class="puntos">
          ${BIENVENIDA.map((_,i) => `<i class="${i === pasoBienvenida ? 'on' : ''}"></i>`).join('')}
        </div>
        <button class="boton" onclick="avanzarBienvenida()">
          ${ultimo ? 'Empezar' : 'Siguiente'}</button>
      </section>
    </div>`;
}
function avanzarBienvenida(){
  if (pasoBienvenida < BIENVENIDA.length - 1){ pasoBienvenida++; pintar(); }
  else cerrarBienvenida();
}
function cerrarBienvenida(){
  marcarBienvenidaVista();
  pasoBienvenida = 0;
  ir('inicio');
}
// Botón "¿Qué es esto?": reabre la bienvenida cuando la persona quiera.
function abrirAyuda(){ pasoBienvenida = 0; ir('bienvenida'); }

function aceptar(){ darConsentimiento(); ir('tarjeta'); }

// La tarjeta de hoy. Quince segundos: tres toques y ya.
function pantallaTarjeta(){
  if (!hayConsentimiento()) return pantallaConsentimiento();

  const fecha = hoyISO();
  const previa = leerTarjetas()[fecha] || { animo:null, habilidades:[], nota:'' };
  let animo = previa.animo;
  let habs = [...(previa.habilidades || [])];

  vista().innerHTML = `
    <button class="volver" onclick="ir('inicio')">← Volver</button>
    <h1 class="titulo">Tarjeta de hoy</h1>
    <p class="entradilla">No hay respuestas buenas ni malas. Solo cómo ha ido.</p>
    <div style="height:4px"></div>

    <section class="bloque">
      <h3>¿Cómo estás hoy?</h3>
      <div class="animos" id="animos">
        ${ANIMOS.map(a => `
          <button class="animo" data-n="${a.n}" aria-pressed="${animo === a.n}"
            title="${a.etq}">${a.cara}</button>`).join('')}
      </div>
      <div class="animo-etq"><span>Muy bajo</span><span>Muy bien</span></div>
    </section>

    <div id="zonaSugerencia"></div>

    <section class="bloque">
      <h3>¿Has practicado algo hoy?</h3>
      <div class="habs" id="habs">
        ${HABILIDADES.map(h => `
          <button class="hab" data-id="${h.id}" aria-pressed="${habs.includes(h.id)}">
            <span class="marca">${habs.includes(h.id) ? '✓' : '○'}</span>${h.etq}
          </button>`).join('')}
      </div>
    </section>

    <section class="bloque">
      <h3>Una línea, si quieres</h3>
      <textarea id="nota" placeholder="Lo que no cabe en un número…">${esc(previa.nota || '')}</textarea>
    </section>

    <button class="boton" id="guardar">Guardar</button>
    <button class="boton sec" onclick="ir('progreso')">Ver mi progreso</button>`;

  // Ánimo
  document.getElementById('animos').onclick = e => {
    const b = e.target.closest('.animo'); if (!b) return;
    animo = Number(b.dataset.n);
    document.querySelectorAll('.animo').forEach(x =>
      x.setAttribute('aria-pressed', Number(x.dataset.n) === animo));
    sugerir(animo);
  };

  // Habilidades
  document.getElementById('habs').onclick = e => {
    const b = e.target.closest('.hab'); if (!b) return;
    const id = b.dataset.id;
    habs.includes(id) ? habs.splice(habs.indexOf(id),1) : habs.push(id);
    const puesta = habs.includes(id);
    b.setAttribute('aria-pressed', puesta);
    b.querySelector('.marca').textContent = puesta ? '✓' : '○';
  };

  document.getElementById('guardar').onclick = () => {
    const ok = guardarTarjeta(fecha, {
      animo, habilidades: habs, nota: document.getElementById('nota').value.trim()
    });
    const b = document.getElementById('guardar');
    b.textContent = ok ? 'Guardado ✓' : 'No he podido guardar';
    relojes.push(setTimeout(() => ir('inicio'), 700));
  };

  if (animo !== null) sugerir(animo);
}

// Si el ánimo está bajo: ofrecer SUS habilidades. Ni juicio, ni alarma.
function sugerir(animo){
  const z = document.getElementById('zonaSugerencia');
  if (!z) return;
  if (animo === null || animo > ANIMO_BAJO){ z.innerHTML = ''; return; }
  z.innerHTML = `
    <section class="sugerencia">
      <p>Hoy pesa. No hace falta que hagas nada con eso ahora mismo, pero si quieres,
        tienes tus herramientas a mano.</p>
      <button class="boton" onclick="ir('menu')">Ver qué puedo hacer</button>
      <p class="recuerda">Y si no consigues ponerlo en marcha, urgencias está abierta
        siempre. Lo tienes arriba.</p>
    </section>`;
}

// Progreso: la forma, no una nota. Sin porcentajes ni comparaciones.
function pantallaProgreso(){
  if (!hayConsentimiento()) return pantallaConsentimiento();

  const tarjetas = leerTarjetas();
  const total = diasPracticando();

  // últimos 30 días, el de hoy el último
  const celdas = [];
  for (let i = 29; i >= 0; i--){
    const d = new Date(); d.setDate(d.getDate() - i);
    const t = tarjetas[hoyISO(d)];
    const a = t && t.animo ? ANIMOS.find(x => x.n === t.animo) : null;
    celdas.push(`<div class="dia" title="${hoyISO(d)}"
      style="${a ? 'background:'+a.color+';border-color:'+a.color : ''}"></div>`);
  }

  const conNota = Object.entries(tarjetas)
    .filter(([,t]) => t.nota)
    .sort((a,b) => b[0].localeCompare(a[0]))
    .slice(0,5);

  vista().innerHTML = `
    <button class="volver" onclick="ir('inicio')">← Volver</button>
    <h1 class="titulo">Mi progreso</h1>
    <p class="entradilla">Esto no es una nota. Es para ver la forma: cuándo cuesta más,
      qué se repite, qué te ayuda.</p>
    <div style="height:4px"></div>

    <section class="bloque contador">
      <div class="num">${total}</div>
      <div class="etq">${total === 1 ? 'día practicando habilidades' : 'días practicando habilidades'}</div>
      <p style="font-size:12px;color:var(--suave);margin:10px 0 0;line-height:1.5">
        Este número solo sube. No se pierde por un mal día.</p>
    </section>

    <section class="bloque">
      <h3>Los últimos 30 días</h3>
      <div class="tira">${celdas.join('')}</div>
      <div class="leyenda"><span>hace 30 días</span><span>hoy</span></div>
      <p style="font-size:12px;color:var(--suave);margin:12px 0 0;line-height:1.5">
        Los huecos son días sin rellenar. No pasa nada: no hay que rellenarlos todos.</p>
    </section>

    ${conNota.length ? `
    <section class="bloque">
      <h3>Lo que escribiste</h3>
      ${conNota.map(([f,t]) => `
        <p style="margin:0 0 10px;font-size:13px;line-height:1.6;color:var(--suave)">
          <strong style="color:var(--texto)">${f.split('-').reverse().join('/')}</strong><br>
          ${esc(t.nota)}</p>`).join('')}
    </section>` : ''}

    <section class="bloque">
      <h3>Tus datos</h3>
      <p style="margin:0 0 12px;font-size:13px;color:var(--suave);line-height:1.6">
        Todo esto está solo en este móvil. Nadie más lo ve.</p>
      <button class="peligro-btn" onclick="pedirBorrado()">Borrar todos mis datos</button>
    </section>`;
}

function pedirBorrado(){
  if (confirm('¿Seguro? Se borrará todo lo que has escrito y no se puede recuperar.')){
    borrarTodo();
    ir('inicio');
  }
}
// Avisos: solo lectura. Publica el terapeuta; aquí nadie escribe ni responde.
function pantallaAvisos(){
  let cuerpo;
  if (avisos === null && !avisosFallo){
    cuerpo = '<p class="vacio">Cargando…</p>';
  } else if (avisosFallo && avisos === null){
    cuerpo = '<p class="vacio">No he podido cargar los avisos.<br>' +
             'Cuando vuelvas a tener conexión, aparecerán aquí.</p>';
  } else if (!avisos.length){
    cuerpo = '<p class="vacio">No hay avisos ahora mismo.</p>';
  } else {
    cuerpo = avisos.map(a => `
      <article class="aviso-item">
        <h3>${esc(a.titulo)}</h3>
        ${a.cuando ? `<span class="cuando">${esc(a.cuando)}</span>` : ''}
        ${a.texto ? `<p>${esc(a.texto)}</p>` : ''}
      </article>`).join('');
  }

  vista().innerHTML = `
    <button class="volver" onclick="ir('inicio')">← Volver</button>
    <h1 class="titulo">Avisos</h1>
    <p class="entradilla">Actividades y avisos de la asociación. La participación siempre
      es voluntaria.</p>
    <div style="height:4px"></div>
    ${cuerpo}`;
}

// Surf del craving: 15 min, con frases que van cambiando.
function pantallaSurf(){
  const TOTAL = 15*60;
  vista().innerHTML = `
    <button class="volver" onclick="ir('menu')">← Volver</button>
    <section class="ejercicio">
      <h1 class="titulo">Surf del craving</h1>
      <div class="reloj" id="reloj">${mmss(TOTAL)}</div>
      <p class="guia" id="guia">${FRASES_SURF[0]}</p>
      <button class="boton" id="btn">Empezar</button>
      <p class="nota">El impulso no crece para siempre: sube, llega a un pico y baja solo,
        normalmente en 15-20 minutos. No tienes que hacerlo desaparecer. Solo acompañarlo.
        (TM · tolerancia al malestar)</p>
    </section>
    <button class="boton sec" onclick="ir('menu')">He superado la ola</button>`;

  let quedan = TOTAL, corriendo = false;
  const reloj = document.getElementById('reloj');
  const guia  = document.getElementById('guia');
  const btn   = document.getElementById('btn');

  btn.onclick = () => {
    if (corriendo){ pararRelojes(); corriendo = false; btn.textContent = 'Seguir'; return; }
    corriendo = true; btn.textContent = 'Pausa';
    const id = setInterval(() => {
      quedan--;
      reloj.textContent = mmss(Math.max(0, quedan));
      // una frase distinta por cada tramo del ejercicio
      const tramo = Math.floor((TOTAL - quedan) / (TOTAL / FRASES_SURF.length));
      guia.textContent = FRASES_SURF[Math.min(tramo, FRASES_SURF.length - 1)];
      if (quedan <= 0){
        pararRelojes(); corriendo = false;
        guia.textContent = 'La ola ha pasado. Lo has hecho tú.';
        btn.textContent = 'Terminado';
        btn.disabled = true;
      }
    }, 1000);
    relojes.push(id);
  };
}

// Respiración 4-6-8, con el círculo guiando el ritmo.
function pantallaRespiracion(){
  vista().innerHTML = `
    <button class="volver" onclick="ir('menu')">← Volver</button>
    <section class="ejercicio">
      <h1 class="titulo">Respiración 4-6-8</h1>
      <div class="circulo" id="circulo"></div>
      <p class="guia" id="guia">Sigue el círculo: crece al coger aire, se queda quieto y
        baja al soltarlo.</p>
      <button class="boton" id="btn">Empezar</button>
      <p class="nota">Soltar el aire más despacio de lo que se coge baja la activación del
        cuerpo. No fuerces: si te mareas, respira normal.</p>
    </section>
    <button class="boton sec" onclick="ir('menu')">Ya estoy mejor</button>`;

  const FASES = [
    { texto:'Coge aire por la nariz…', seg:4, escala:1    },
    { texto:'Mantén…',                 seg:6, escala:1    },
    { texto:'Suelta despacio…',        seg:8, escala:.55  },
  ];
  const circulo = document.getElementById('circulo');
  const guia = document.getElementById('guia');
  const btn  = document.getElementById('btn');
  let i = 0;

  function fase(){
    const f = FASES[i % FASES.length];
    guia.textContent = f.texto;
    circulo.style.transitionDuration = f.seg + 's';
    circulo.style.transform = 'scale(' + f.escala + ')';
    i++;
    relojes.push(setTimeout(fase, f.seg * 1000));
  }

  btn.onclick = () => {
    pararRelojes();
    if (btn.dataset.on === '1'){
      btn.dataset.on = '0'; btn.textContent = 'Empezar';
      guia.textContent = 'Cuando quieras, seguimos.';
      return;
    }
    btn.dataset.on = '1'; btn.textContent = 'Parar';
    i = 0; fase();
  };
}

// TIP — temperatura. Activa el reflejo de inmersión.
function pantallaTip(){
  vista().innerHTML = `
    <button class="volver" onclick="ir('menu')">← Volver</button>
    <section class="ejercicio">
      <h1 class="titulo">Temperatura</h1>
      <ol class="pasos">
        <li>Llena el lavabo de agua fría, o coge hielo envuelto en un paño.</li>
        <li>Aguanta la respiración.</li>
        <li>Mete la cara en el agua, o apoya el frío en la frente y los ojos.</li>
        <li>Aguanta unos 30 segundos.</li>
      </ol>
      <div class="reloj" id="reloj">00:30</div>
      <button class="boton" id="btn">Empezar 30 seg</button>
      <p class="nota">El frío en la cara baja el pulso en segundos: es un reflejo del cuerpo,
        no fuerza de voluntad. Sirve cuando la activación está tan alta que no puedes pensar.
        <br><br>Si tienes un problema de corazón, la tensión baja o tomas medicación cardíaca,
        consúltalo antes con tu médico.</p>
    </section>
    <button class="boton sec" onclick="ir('menu')">Ya estoy mejor</button>`;

  const reloj = document.getElementById('reloj');
  const btn = document.getElementById('btn');
  let quedan = 30;

  btn.onclick = () => {
    pararRelojes();
    quedan = 30;
    btn.disabled = true;
    const id = setInterval(() => {
      quedan--;
      reloj.textContent = mmss(Math.max(0, quedan));
      if (quedan <= 0){
        pararRelojes();
        reloj.textContent = '00:00';
        btn.disabled = false;
        btn.textContent = 'Otra vez';
      }
    }, 1000);
    relojes.push(id);
  };
}

const PANTALLAS = {
  inicio: pantallaInicio,
  menu: pantallaMenu,
  surf: pantallaSurf,
  respiracion: pantallaRespiracion,
  tip: pantallaTip,
  pros: pantallaPros,
  avisos: pantallaAvisos,
  bienvenida: pantallaBienvenida,
  consentimiento: pantallaConsentimiento,
  tarjeta: pantallaTarjeta,

// La cabecera: señal de honestidad + aviso del bloque de apoyo.
function pintarCabecera(){
  const v = estadoVentana();
  document.getElementById('estado').dataset.abierto = v.abierto;
  document.getElementById('estadoTitulo').textContent =
    v.abierto ? 'Centro abierto' : 'Centro cerrado';
  document.getElementById('estadoSub').textContent =
    v.abierto ? 'hay alguien · hasta las ' + v.cierraA
              : 'sin moderación ahora' + (v.proximaApertura ? ' · abre ' + v.proximaApertura : '');
  const aviso = document.getElementById('apoyoAviso');
  aviso.textContent = TEXTOS.avisoSinModeracion;
  aviso.hidden = v.abierto;
}

function pintar(){
  pintarCabecera();
  (PANTALLAS[pantalla] || pantallaInicio)();
}

// Estos no cambian con la hora: se ponen una sola vez.
document.getElementById('apoyoTitulo').textContent = TEXTOS.apoyoTitulo;
document.getElementById('apoyoTexto').innerHTML = TEXTOS.apoyoTexto;
document.getElementById('apoyoPeligro').innerHTML = TEXTOS.peligro;

// La primera vez que se abre, mostrar la bienvenida (se puede saltar).
if (!bienvenidaVista()) pantalla = 'bienvenida';

pintar();
cargarAvisos();

// Refresca SOLO la cabecera cada 30s: si la app se queda abierta y cruza
// las 20:30, la señal no debe seguir diciendo "hay alguien".
// No repinta la pantalla, para no cortar un ejercicio en marcha.
setInterval(pintarCabecera, 30000);

// Service worker: hace que la app funcione sin conexión y se pueda instalar.
if ('serviceWorker' in navigator){
  addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
