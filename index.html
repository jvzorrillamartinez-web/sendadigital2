<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f6f2e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icono-192.png">
<link rel="apple-touch-icon" href="icono-192.png">
<title>SendaDigital</title>
<style>
  :root{
    --fondo:#f6f2e8; --superficie:#fff; --borde:#e2e2dd;
    --texto:#22221f; --suave:#6b6b64;
    --ok:#0f6e56; --ok-fondo:#e1f5ee;
    --crisis:#a32d2d; --crisis-fondo:#fcebeb; --crisis-borde:#f09595;
    --radio:14px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --fondo:#17171a; --superficie:#202024; --borde:#34343a;
      --texto:#ececec; --suave:#a0a0a0;
      --ok:#5dcaa5; --ok-fondo:#123a30;
      --crisis:#f09595; --crisis-fondo:#3a1c1c; --crisis-borde:#7a3b3b;
    }
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--fondo); color:var(--texto);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  main{max-width:460px; margin:0 auto; padding:16px; display:flex; flex-direction:column; gap:12px}

  /* Señal de honestidad: ¿hay alguien detrás ahora? */
  .estado{display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-radius:var(--radio); background:var(--superficie); border:1px solid var(--borde)}
  .estado[data-abierto="true"]{background:var(--ok-fondo); border-color:transparent}
  .punto{width:10px; height:10px; border-radius:50%; background:var(--suave); flex:none}
  .estado[data-abierto="true"] .punto{background:var(--ok)}
  .estado div{display:flex; flex-direction:column; line-height:1.35}
  .estado strong{font-size:15px}
  .estado span{font-size:13px; color:var(--suave)}
  .estado[data-abierto="true"] strong, .estado[data-abierto="true"] span{color:var(--ok)}

  /* Bloque de apoyo: idéntico a cualquier hora. Sin alarma. */
  .apoyo{background:var(--superficie); border:1px solid var(--borde);
    border-radius:var(--radio); padding:16px}
  .apoyo h2{margin:0 0 6px; font-size:16px; font-weight:500}
  .apoyo p{margin:0; font-size:14px; color:var(--suave); line-height:1.55}
  .apoyo strong{color:var(--texto)}
  .aviso{margin:10px 0 0 !important; font-size:14px; color:var(--texto); line-height:1.55}
  /* 112: discreto, al pie, y solo para lo que es. */
  .peligro{margin:12px 0 0 !important; padding-top:12px; border-top:1px solid var(--borde);
    font-size:13px !important; line-height:1.5}
  .peligro a{color:var(--crisis); font-weight:600; text-decoration:none;
    border-bottom:1px solid var(--crisis-borde); padding-bottom:1px}

  .tarjeta{display:flex; flex-direction:column; gap:2px; text-align:left; width:100%;
    background:var(--superficie); border:1px solid var(--borde); border-radius:var(--radio);
    padding:16px; font:inherit; color:inherit; cursor:pointer}
  .tarjeta.foco{border-color:var(--suave)}
  .tarjeta.atenuada{opacity:.65}
  .tarjeta b{font-size:15px; font-weight:500}
  .tarjeta em{font-size:13px; color:var(--suave); font-style:normal}
  .rejilla{display:flex; gap:8px}
  .rejilla .tarjeta{padding:14px}
  .ok{color:var(--ok)}
</style>
</head>
<body>
<main>
  <header class="estado" id="estado">
    <div class="punto"></div>
    <div><strong id="estadoTitulo"></strong><span id="estadoSub"></span></div>
  </header>

  <!-- Bloque de apoyo: NO cambia con la hora. Funciona sin conexión. -->
  <section class="apoyo">
    <h2 id="apoyoTitulo"></h2>
    <p id="apoyoTexto"></p>
    <p class="aviso" id="apoyoAviso" hidden></p>
    <p class="peligro" id="apoyoPeligro"></p>
  </section>

  <div id="vista"></div>
</main>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURACIÓN — esto es lo único que hay que tocar
   ═══════════════════════════════════════════════════════════════ */

// Horario REAL del centro (cuándo hay alguien detrás).
// 0=domingo, 1=lunes, 2=martes, 3=miércoles, 4=jueves, 5=viernes, 6=sábado
// null = ese día el centro no abre.
const HORARIO = {
  0: null,
  1: { inicio:'09:00', fin:'20:30' },
  2: { inicio:'09:00', fin:'20:30' },
  3: { inicio:'09:00', fin:'20:30' },
  4: { inicio:'09:00', fin:'20:30' },
  5: { inicio:'09:00', fin:'13:30' },
  6: null,
};

// Andamiaje de textos. La redacción final es de Jo.
const TEXTOS = {
  apoyoTitulo: 'Si no consigues ponerlo en marcha',
  apoyoTexto: 'Si has probado tus recursos y el malestar no baja, <strong>acude a urgencias</strong>. Están abiertas siempre.',
  avisoSinModeracion: 'Ahora no hay nadie en el centro: no esperes respuesta aquí.',
  // 112: para lo que no admite espera ni desplazamiento. No es la vía para el craving.
  peligro: 'Si hay peligro inmediato para tu vida o tu seguridad, o no puedes desplazarte: <a href="tel:112">112</a>',
};

/* ═══════════════════════════════════════════════════════════════
   LÓGICA — a partir de aquí, normalmente no hace falta tocar nada
   ═══════════════════════════════════════════════════════════════ */

const DIAS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
const aMinutos = h => { const [a,b] = h.split(':').map(Number); return a*60 + b; };

// ¿Hay moderación en este momento?
function estadoVentana(ahora = new Date()){
  const dia = ahora.getDay();
  const m = ahora.getHours()*60 + ahora.getMinutes();
  const franja = HORARIO[dia];
  if (franja && m >= aMinutos(franja.inicio) && m < aMinutos(franja.fin)){
    // fin exclusivo: a las 20:30 exactas ya está cerrado
    return { abierto:true, cierraA:franja.fin, proximaApertura:null };
  }
  return { abierto:false, cierraA:null, proximaApertura:proximaApertura(ahora) };
}

function proximaApertura(ahora){
  const m = ahora.getHours()*60 + ahora.getMinutes();
  for (let i = 0; i < 8; i++){
    const dia = (ahora.getDay() + i) % 7;
    const franja = HORARIO[dia];
    if (!franja) continue;
    if (i === 0 && m >= aMinutos(franja.inicio)) continue; // hoy ya pasó la apertura
    const cuando = i === 0 ? 'hoy' : i === 1 ? 'mañana' : DIAS[dia];
    return cuando + ' a las ' + franja.inicio;
  }
  return null;
}

const VISTA_ABIERTO = `
  <button class="tarjeta">
    <b>Tarjeta de hoy</b><em>¿Cómo estás hoy?</em>
  </button>
  <button class="tarjeta">
    <b>Avisos</b><em>próxima actividad</em>
  </button>`;

const VISTA_CERRADO = `
  <button class="tarjeta foco">
    <b>Un momento difícil</b><em>tolerancia al malestar · empezar</em>
  </button>
  <button class="tarjeta atenuada">
    <b>Tarjeta de hoy</b><em>disponible cuando quieras</em>
  </button>`;

function pintar(){
  const v = estadoVentana();

  document.getElementById('estado').dataset.abierto = v.abierto;
  document.getElementById('estadoTitulo').textContent =
    v.abierto ? 'Centro abierto' : 'Centro cerrado';
  document.getElementById('estadoSub').textContent =
    v.abierto ? 'hay alguien · hasta las ' + v.cierraA
              : 'sin moderación ahora' + (v.proximaApertura ? ' · abre ' + v.proximaApertura : '');

  const aviso = document.getElementById('apoyoAviso');
  aviso.textContent = TEXTOS.avisoSinModeracion;
  aviso.hidden = v.abierto;

  document.getElementById('vista').innerHTML = v.abierto ? VISTA_ABIERTO : VISTA_CERRADO;
}

// Estos no cambian con la hora: se ponen una sola vez.
document.getElementById('apoyoTitulo').textContent = TEXTOS.apoyoTitulo;
document.getElementById('apoyoTexto').innerHTML = TEXTOS.apoyoTexto;
document.getElementById('apoyoPeligro').innerHTML = TEXTOS.peligro;

pintar();
// Recalcula cada 30s: si la app se queda abierta y cruza las 20:30,
// la señal no debe seguir diciendo "hay alguien".
setInterval(pintar, 30000);

// Service worker: hace que la app funcione sin conexión y se pueda instalar.
if ('serviceWorker' in navigator){
  addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
